<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>報價單系統</title>
    <!-- 引入 Tailwind CSS 用於加強樣式，若加載失敗亦有下方內建本地 CSS 撐住底層佈局 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        /* 基礎全域防禦樣式 (確保即便 CDN 失敗，網頁也不會空白或跑版) */
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f6f2; 
            padding: 40px 20px;
            color: #333;
            margin: 0;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        .quotation-container {
            max-width: 950px;
            margin: 0 auto;
            background: white;
            padding: 50px 60px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border-radius: 2px;
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .brand-name input {
            font-size: 28px;
            font-weight: 500;
            letter-spacing: 2px;
            width: 300px;
            border: none;
            outline: none;
            background: transparent;
        }

        .doc-info {
            font-size: 14px;
            line-height: 1.8;
            color: #666;
            text-align: right;
        }

        .client-info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
            font-size: 15px;
        }

        @media (max-width: 640px) {
            .client-info-grid {
                grid-template-columns: 1fr;
            }
            .col-span-2 {
                grid-column: span 1 / span 1 !important;
            }
        }

        .col-span-2 {
            grid-column: span 2 / span 2;
        }

        .info-item {
            display: flex;
            border-bottom: 1px solid #ddd; 
            padding-bottom: 5px;
            align-items: center;
        }

        .info-label {
            color: #888;
            width: 100px;
            flex-shrink: 0;
            font-size: 14px;
        }

        .item-table th {
            text-align: left;
            font-weight: 500;
            color: #333;
            border-bottom: 2px solid #333;
            padding: 12px 8px;
            font-size: 14px;
        }

        .item-table td {
            border-bottom: 1px solid #ddd; 
            padding: 10px 8px;
            vertical-align: middle;
        }

        .summary-section {
            margin-top: 20px;
            border-top: 1px solid #333;
        }

        .summary-row {
            display: flex;
            justify-content: flex-end;
            border-bottom: 1px dotted #ccc;
            padding: 8px 0;
        }

        .summary-row:last-child {
            border-bottom: 2px solid #333;
            background-color: #fafafa;
        }

        .summary-label {
            width: 200px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 20px;
            color: #333;
            font-weight: 400;
            font-size: 14px;
        }

        .summary-value {
            width: 150px;
            text-align: right;
            padding-right: 8px;
            font-weight: 500;
        }

        .notes-section {
            margin-top: 35px;
            font-size: 13px;
            line-height: 1.6;
            color: #444;
        }

        .signature-section {
            margin-top: 60px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
        }

        .sig-box {
            border-top: 1px solid #333;
            padding-top: 10px;
            font-size: 14px;
            font-weight: 500;
            text-align: left;
            height: 80px;
        }

        input, textarea {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            color: #333;
            padding: 4px;
            font-family: inherit;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        input:focus, textarea:focus {
            background-color: #f0f0f0;
            border-radius: 2px;
        }

        /* 讓 Placeholder 顏色更明顯好讀 */
        input::placeholder, textarea::placeholder {
            color: #aaa;
            opacity: 1;
        }

        .btn-action {
            font-size: 12px;
            color: #666;
            cursor: pointer;
            border: 1px solid #ddd;
            padding: 6px 16px;
            border-radius: 3px;
            transition: all 0.2s;
            background: white;
            font-weight: 500;
        }

        .btn-action:hover {
            background: #333;
            color: white;
            border-color: #333;
        }

        /* 印出按鈕樣式 */
        .btn-print {
            background-color: #44403c;
            color: white;
            padding: 12px 48px;
            border-radius: 2px;
            font-size: 14px;
            letter-spacing: 0.1em;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s, transform 0.1s;
            font-weight: 500;
        }
        .btn-print:hover {
            background-color: #292524;
        }
        .btn-print:active {
            transform: scale(0.98);
        }

        .hint-box {
            font-size: 12px;
            color: #78716c;
            background-color: #f5f5f4;
            padding: 10px 15px;
            border-radius: 4px;
            text-align: center;
            max-width: 500px;
            margin: 10px auto 0;
            line-height: 1.5;
        }

        @media print {
            @page { size: A4; margin: 1.2cm; }
            body { 
                background: white !important; 
                padding: 0 !important; 
                margin: 0 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .quotation-container { 
                box-shadow: none !important; 
                padding: 0 !important; 
                width: 100% !important; 
                max-width: none !important; 
                margin: 0 !important; 
            }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

<div class="quotation-container" id="print-area">
    <!-- 標題部分 -->
    <div class="header-section">
        <div>
            <div class="brand-name"><input type="text" value="瑜珈牆五金" id="brand-input" placeholder="公司/品牌名稱"></div>
            <div style="font-size: 12px; color: #a3a3a3; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.1em;">Quotation</div>
        </div>
        <div class="doc-info">
            <div style="display: flex; justify-content: flex-end; align-items: center;">
                <span>報價單編號：</span>
                <input type="text" value="" placeholder="請輸入編號" id="doc-id" style="width: 110px; text-align: right;">
            </div>
            <div style="display: flex; justify-content: flex-end; align-items: center; margin-top: 4px;">
                <span>報價日期：</span>
                <input type="text" value="" placeholder="請輸入日期" id="doc-date" style="width: 110px; text-align: right;">
            </div>
        </div>
    </div>

    <!-- 客戶資料 -->
    <div class="client-info-grid">
        <div class="info-item">
            <span class="info-label">客戶名稱</span>
            <input type="text" value="" placeholder="請輸入客戶名稱或公司抬頭">
        </div>
        <div class="info-item">
            <span class="info-label">聯絡人員</span>
            <input type="text" placeholder="聯絡人姓名">
        </div>
        <div class="info-item">
            <span class="info-label">電子信箱</span>
            <input type="text" placeholder="Email Address">
        </div>
        <div class="info-item">
            <span class="info-label">聯絡電話</span>
            <input type="text" placeholder="Phone Number">
        </div>
        <div class="info-item col-span-2">
            <span class="info-label">送貨地址</span>
            <input type="text" placeholder="Delivery Address">
        </div>
        <!-- 自定義備註欄位 -->
        <div class="info-item col-span-2">
            <span class="info-label">備註/其他</span>
            <input type="text" placeholder="例如：指定送貨時間、樓層資訊等...">
        </div>
    </div>

    <!-- 表格內容 -->
    <table class="item-table" id="items-table">
        <thead>
            <tr>
                <th style="width: 32%;">項目內容 Description</th>
                <th style="width: 10%; text-align: center;">數量</th>
                <th style="width: 10%; text-align: center;">單位</th>
                <th style="width: 13%; text-align: right;">單價</th>
                <th style="width: 15%; text-align: right;">費用 Amount</th>
                <th style="width: 20%;">項目備註</th>
                <th style="width: 5px;" class="no-print"></th>
            </tr>
        </thead>
        <tbody id="items-body">
            <!-- 提供三個預設乾淨列，無任何初始數值 -->
            <tr>
                <td><input type="text" placeholder="請輸入項目名稱..."></td>
                <td><input type="number" class="text-center qty" placeholder="0" oninput="calculate()" style="text-align: center;"></td>
                <td><input type="text" placeholder="組/件" class="text-center" style="text-align: center;"></td>
                <td><input type="number" class="text-right price" placeholder="0" oninput="calculate()" style="text-align: right;"></td>
                <td class="text-right row-total" style="text-align: right; padding-right: 8px; font-weight: 500;"></td>
                <td><input type="text" placeholder="項目細節備註..." value=""></td>
                <td class="no-print" style="text-align: center; vertical-align: middle;">
                    <button class="text-gray-300 hover:text-red-500" onclick="deleteRow(this)" style="background:none; border:none; cursor:pointer; font-size:16px;">✕</button>
                </td>
            </tr>
            <tr>
                <td><input type="text" placeholder="請輸入項目名稱..."></td>
                <td><input type="number" class="text-center qty" placeholder="0" oninput="calculate()" style="text-align: center;"></td>
                <td><input type="text" placeholder="組/件" class="text-center" style="text-align: center;"></td>
                <td><input type="number" class="text-right price" placeholder="0" oninput="calculate()" style="text-align: right;"></td>
                <td class="text-right row-total" style="text-align: right; padding-right: 8px; font-weight: 500;"></td>
                <td><input type="text" placeholder="項目細節備註..." value=""></td>
                <td class="no-print" style="text-align: center; vertical-align: middle;">
                    <button class="text-gray-300 hover:text-red-500" onclick="deleteRow(this)" style="background:none; border:none; cursor:pointer; font-size:16px;">✕</button>
                </td>
            </tr>
            <tr>
                <td><input type="text" placeholder="請輸入項目名稱..."></td>
                <td><input type="number" class="text-center qty" placeholder="0" oninput="calculate()" style="text-align: center;"></td>
                <td><input type="text" placeholder="組/件" class="text-center" style="text-align: center;"></td>
                <td><input type="number" class="text-right price" placeholder="0" oninput="calculate()" style="text-align: right;"></td>
                <td class="text-right row-total" style="text-align: right; padding-right: 8px; font-weight: 500;"></td>
                <td><input type="text" placeholder="項目細節備註..." value=""></td>
                <td class="no-print" style="text-align: center; vertical-align: middle;">
                    <button class="text-gray-300 hover:text-red-500" onclick="deleteRow(this)" style="background:none; border:none; cursor:pointer; font-size:16px;">✕</button>
                </td>
            </tr>
        </tbody>
    </table>

    <div style="margin-top: 15px;" class="no-print">
        <button onclick="addRow()" class="btn-action">+ 新增項目 Row</button>
    </div>

    <!-- 結帳區 -->
    <div class="summary-section">
        <div class="summary-row">
            <div class="summary-label">合計 Subtotal</div>
            <div class="summary-value" id="subtotal">0</div>
        </div>
        <div class="summary-row">
            <div class="summary-label" style="display: flex; align-items: center; justify-content: flex-end;">
                <input type="number" id="tax-rate" value="5" style="width: 40px; text-align: center; font-weight: 500;" oninput="calculate()">
                <span>% 稅金 VAT</span>
            </div>
            <div class="summary-value" id="tax">0</div>
        </div>
        <div class="summary-row">
            <div class="summary-label" style="font-weight: bold; font-size: 15px;">總計 Total</div>
            <div class="summary-value" id="total-amount" style="font-weight: bold; font-size: 18px; color: #111;">$0</div>
        </div>
    </div>

    <!-- 備註說明 -->
    <div class="notes-section">
        <div style="font-weight: bold; margin-bottom: 6px;">合作備註：</div>
        <div style="display: flex; flex-direction: column; gap: 6px;">
            <div style="display: flex; align-items: center;"><span style="margin-right: 8px;">1.</span><input type="text" value="若有任何約定條款，請於簽訂本估價單時一併提出。"></div>
            <div style="display: flex; align-items: flex-start;"><span style="margin-right: 8px; margin-top: 4px;">2.</span><textarea rows="2" oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'">付款方式：頭款於報價單回簽後，7天內支付五成製作費；尾款50%則於交貨後30天內電匯支付。</textarea></div>
            <div style="display: flex; align-items: center;"><span style="margin-right: 8px;">3.</span><input type="text" value="上述內容有未盡之處，雙方以最大誠意協商之。"></div>
        </div>
    </div>

    <!-- 簽名 -->
    <div class="signature-section">
        <div class="sig-box">專案負責人簽章</div>
        <div class="sig-box">客戶簽章</div>
    </div>

    <!-- 操作按鈕 -->
    <div id="controls" class="no-print" style="margin-top: 50px; display: flex; flex-direction: column; align-items: center; gap: 10px;">
        <button onclick="handlePrint()" class="btn-print">
            開啟列印 / 儲存視窗 (PDF)
        </button>
        <div class="hint-box">
            <strong>💡 提示資訊</strong><br>
            若點擊按鈕無反應，請檢查瀏覽器最上方網址列右側，是否出現「已阻擋快顯視窗（彈出視窗）」提示，請點選「永遠允許來自此網站的彈出視窗」即可順利輸出！
        </div>
    </div>
</div>

<script>
    function addRow() {
        const tbody = document.getElementById('items-body');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" placeholder="請輸入項目名稱..."></td>
            <td><input type="number" class="text-center qty" placeholder="0" oninput="calculate()" style="text-align: center;"></td>
            <td><input type="text" placeholder="單位" class="text-center" style="text-align: center;"></td>
            <td><input type="number" class="text-right price" placeholder="0" oninput="calculate()" style="text-align: right;"></td>
            <td class="text-right row-total" style="text-align: right; padding-right: 8px; font-weight: 500;"></td>
            <td><input type="text" placeholder="項目備註..."></td>
            <td class="no-print" style="text-align: center; vertical-align: middle;">
                <button class="text-gray-300 hover:text-red-500" onclick="deleteRow(this)" style="background:none; border:none; cursor:pointer; font-size:16px;">✕</button>
            </td>
        `;
        tbody.appendChild(tr);
    }

    function deleteRow(btn) {
        const row = btn.parentNode.parentNode;
        row.parentNode.removeChild(row);
        calculate();
    }

    function calculate() {
        const rows = document.querySelectorAll('#items-body tr');
        let subtotal = 0;

        rows.forEach(row => {
            const qtyInput = row.querySelector('.qty');
            const priceInput = row.querySelector('.price');
            const rowTotalCell = row.querySelector('.row-total');
            
            if (!qtyInput || !priceInput || !rowTotalCell) return;

            const qty = parseFloat(qtyInput.value) || 0;
            const price = parseFloat(priceInput.value) || 0;
            
            if (qty > 0 && price > 0) {
                const total = qty * price;
                rowTotalCell.textContent = total.toLocaleString();
                subtotal += total;
            } else {
                rowTotalCell.textContent = '';
            }
        });

        const rateInput = document.getElementById('tax-rate');
        const rate = rateInput ? (parseFloat(rateInput.value) || 0) : 0;
        const tax = Math.round(subtotal * (rate / 100));
        const grandTotal = subtotal + tax;

        const subtotalEl = document.getElementById('subtotal');
        const taxEl = document.getElementById('tax');
        const totalEl = document.getElementById('total-amount');

        if (subtotalEl) subtotalEl.textContent = subtotal.toLocaleString();
        if (taxEl) taxEl.textContent = tax.toLocaleString();
        if (totalEl) totalEl.textContent = '$' + grandTotal.toLocaleString();
    }

    function handlePrint() {
        // 同步所有動態輸入的值到 HTML 屬性中，確保複製出來的 HTML 保留內容
        document.querySelectorAll('input').forEach(el => el.setAttribute('value', el.value));
        document.querySelectorAll('textarea').forEach(el => el.textContent = el.value);

        const printWindow = window.open('', '_blank');
        if (!printWindow) {
            alert('❌ 彈出視窗被瀏覽器阻擋了！\n\n請查看瀏覽器網址列右側，並選擇「允許來自此網站的彈出視窗（Popups）」，然後重新點擊按鈕。');
            return;
        }

        const head = document.head.innerHTML;
        const contentClone = document.getElementById('print-area').cloneNode(true);
        
        // 將複製內容中所有的 input 和 textarea 取代成純文字，避免列印時顯示輸入框的外框
        contentClone.querySelectorAll('input').forEach(input => {
            const span = document.createElement('span');
            span.textContent = input.value || ''; 
            
            if (input.style.textAlign === 'center' || input.classList.contains('text-center')) {
                span.style.textAlign = 'center';
            }
            if (input.style.textAlign === 'right' || input.classList.contains('text-right')) {
                span.style.textAlign = 'right';
            }
            
            span.style.display = 'inline-block';
            span.style.width = '100%';
            span.className = input.className; 
            
            input.parentNode.replaceChild(span, input);
        });

        contentClone.querySelectorAll('textarea').forEach(textarea => {
            const div = document.createElement('div');
            div.textContent = textarea.value || '';
            div.style.whiteSpace = 'pre-wrap';
            div.style.width = '100%';
            div.className = textarea.className;
            
            textarea.parentNode.replaceChild(div, textarea);
        });

        // 移除不需印出的控制元件
        const controls = contentClone.querySelector('#controls');
        if (controls) controls.remove();

        printWindow.document.write(`
            <html>
                <head>
                    ${head}
                    <style>
                        body { 
                            background: white !important; 
                            padding: 20px !important; 
                            -webkit-print-color-adjust: exact !important;
                            print-color-adjust: exact !important;
                        }
                        .no-print { display: none !important; }
                        
                        /* 強制顯示格線與線條 */
                        .item-table th {
                            border-bottom: 2px solid #333 !important;
                        }
                        .item-table td {
                            border-bottom: 1px solid #ccc !important;
                        }
                        .info-item {
                            border-bottom: 1px solid #ccc !important;
                        }
                        .header-section {
                            border-bottom: 2px solid #333 !important;
                        }
                        .summary-section {
                            border-top: 1px solid #333 !important;
                        }
                        .summary-row {
                            border-bottom: 1px dotted #ccc !important;
                        }
                        .summary-row:last-child {
                            border-bottom: 2px solid #333 !important;
                            background-color: #fafafa !important;
                        }

                        span, div { 
                            border: none !important; 
                            background: transparent !important; 
                        }
                        .quotation-container { box-shadow: none !important; margin: 0 auto !important; }
                    </style>
                </head>
                <body>
                    <div style="width: 900px; margin: 0 auto;">
                        ${contentClone.innerHTML}
                    </div>
                    <script>
                        window.onload = function() {
                            setTimeout(() => {
                                window.print();
                            }, 500);
                        };
                    <\/script>
                </body>
            </html>
        `);
        printWindow.document.close();
    }

    // 確保 DOM 讀取完畢後再初始化計算
    document.addEventListener("DOMContentLoaded", function() {
        calculate();
    });
    // 相容性後備
    window.onload = calculate;
</script>

</body>
</html>
